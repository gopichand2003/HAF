<!DOCTYPE html>
<html lang="en">
<head>
  <title>Help - Holy Army Fellowship</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="help.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
  <header id="main-header">
    <div class="site-title">
      <a href="homepage.html"><h1>Holy Army Fellowship Frames</h1></a>
    </div>
    <div class="header-controls">
      <button class="menu-toggle" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <nav class="main-nav">
    <button class="nav-close" aria-label="Close navigation">
      <i class="fas fa-times"></i>
    </button>
    <div class="nav-container">
      <div class="nav-links">
        <a href="homepage.html" class="nav-home">
          <i class="fas fa-home"></i>
          Home
        </a>
        <a href="profile.html">
          <i class="fas fa-user"></i>
          Profile
        </a>
        <a href="#help">
          <i class="fas fa-question-circle"></i>
          Help
        </a>
        <button id="logout">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="help-page">
    <div class="help-container">
      <div class="chat-section">
        <div class="chat-header">
          <h2>Chat with Support</h2>
          <p>We're here to help!</p>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Messages will be loaded here -->
        </div>

        <form id="chatForm" class="chat-form">
          <div class="message-input">
            <input type="text" id="messageInput" placeholder="Type your message..." required>
            <button type="submit">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script type="module" src="help.js"></script>
</body>
</html>
